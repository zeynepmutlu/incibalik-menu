<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İnci Balık Menü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #041427;
      --bg-2: #08203b;
      --bg-3: #0d2b4d;
      --paper: #fcfbf8;
      --paper-2: #f5efe7;
      --text: #0f2742;
      --muted: #617285;
      --navy: #102d4b;
      --navy-soft: #173d66;
      --gold: #c8a56a;
      --gold-soft: rgba(200, 165, 106, 0.18);
      --line: rgba(16, 39, 66, 0.10);
      --shadow: 0 24px 60px rgba(0, 8, 18, 0.34);
      --shadow-soft: 0 14px 32px rgba(0, 10, 22, 0.18);
      --radius-xl: 30px;
      --radius-lg: 24px;
      --sticky-offset: 96px;
      --fish-art: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 320'%3E%3Cg fill='none' stroke='%23c8a56a' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round' opacity='0.95'%3E%3Cpath d='M112 20 C80 70 63 122 68 185 C72 238 95 278 110 300 C126 277 149 236 152 184 C155 132 139 76 112 20Z'/%3E%3Cpath d='M110 299 C80 260 44 244 18 250 C40 225 53 205 57 181 C39 152 28 128 18 101 C46 111 83 101 109 74'/%3E%3Cpath d='M111 299 C141 260 177 244 203 250 C181 225 168 205 164 181 C182 152 193 128 203 101 C175 111 138 101 112 74'/%3E%3Cpath d='M97 57 C114 79 123 107 125 150 C126 192 121 236 111 279'/%3E%3Cpath d='M91 89 C112 102 126 123 130 168'/%3E%3Cpath d='M87 123 C105 136 117 155 121 193'/%3E%3Cpath d='M82 159 C98 171 109 186 112 212'/%3E%3Cpath d='M75 197 C89 208 98 219 101 240'/%3E%3Cpath d='M123 92 C104 105 94 127 90 170'/%3E%3Cpath d='M129 127 C113 140 103 160 100 194'/%3E%3Cpath d='M134 163 C120 174 111 191 108 214'/%3E%3Ccircle cx='125' cy='92' r='4.2'/%3E%3C/g%3E%3C/svg%3E");
      --shell-art: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 280 260'%3E%3Cg fill='none' stroke='%23c8a56a' stroke-width='2.7' stroke-linecap='round' opacity='0.95'%3E%3Cpath d='M38 198 C56 76 114 25 140 25 C166 25 224 76 242 198'/%3E%3Cpath d='M58 198 C66 129 95 78 140 47 C185 78 214 129 222 198'/%3E%3Cpath d='M86 198 C92 145 112 102 140 71 C168 102 188 145 194 198'/%3E%3Cpath d='M112 198 C116 160 126 130 140 102 C154 130 164 160 168 198'/%3E%3Cpath d='M38 198 Q140 232 242 198'/%3E%3C/g%3E%3C/svg%3E");
      --coral-art: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 320'%3E%3Cg fill='none' stroke='%23c8a56a' stroke-width='2.5' stroke-linecap='round' opacity='0.88'%3E%3Cpath d='M106 300 C100 252 103 212 102 170 C101 128 94 103 78 72'/%3E%3Cpath d='M103 192 C85 177 63 164 42 159'/%3E%3Cpath d='M103 160 C124 141 135 118 136 90'/%3E%3Cpath d='M102 218 C126 210 147 194 164 170'/%3E%3Cpath d='M101 129 C80 112 68 88 66 55'/%3E%3Cpath d='M103 246 C84 239 68 224 56 205'/%3E%3Cpath d='M104 118 C118 96 124 72 123 42'/%3E%3Cpath d='M103 283 C120 268 130 249 134 225'/%3E%3Cpath d='M102 175 C121 181 143 180 166 172'/%3E%3C/g%3E%3C/svg%3E");
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: #f7f7f7;
      background:
        radial-gradient(circle at 20% 0%, rgba(200, 165, 106, 0.12), transparent 0 18%),
        radial-gradient(circle at 88% 18%, rgba(25, 69, 113, 0.30), transparent 0 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
    }

    .shell {
      width: 100%;
      padding: 20px 14px 44px;
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      padding: 26px 22px 20px;
      margin-bottom: 18px;
      color: #fff;
      background:
        radial-gradient(circle at 88% 12%, rgba(255, 255, 255, 0.08), transparent 0 18%),
        linear-gradient(145deg, rgba(8, 24, 43, 0.98), rgba(15, 48, 83, 0.96));
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.08);
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: auto -12px -24px auto;
      width: 200px;
      height: 200px;
      background-image: var(--fish-art);
      background-repeat: no-repeat;
      background-size: contain;
      opacity: 0.06;
      transform: rotate(-8deg);
      pointer-events: none;
      z-index: 0;
    }

    .hero-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand-block {
      max-width: 340px;
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 60px;
      line-height: 0.92;
      letter-spacing: 0.01em;
      font-weight: 700;
    }

    .hero-subtitle {
      margin-top: 12px;
      max-width: 310px;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.84);
    }

    .hero-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .hero-seal {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(245, 240, 233, 0.96));
      border: 1px solid rgba(200, 165, 106, 0.34);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.20);
      overflow: hidden;
      display: grid;
      place-items: center;
      position: relative;
    }

    .hero-seal::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(200, 165, 106, 0.40);
      pointer-events: none;
      z-index: 2;
    }

    .hero-logo-img {
      width: 176%;
      max-width: none;
      object-fit: cover;
      object-position: center 46%;
      transform: translateY(4px);
      display: block;
      position: relative;
      z-index: 1;
    }

    .lang-switch {
      display: flex;
      gap: 8px;
    }

    .lang-btn {
      min-width: 54px;
      border-radius: 999px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: 0.2s ease;
    }

    .lang-btn.active {
      background: #fff;
      color: var(--navy);
      border-color: #fff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }

    .hero-note {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.90);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      padding: 9px 14px;
      letter-spacing: 0.03em;
    }

    .chips-wrap {
      position: sticky;
      top: 6px;
      z-index: 50;
      margin-bottom: 18px;
      padding: 6px 0 10px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: linear-gradient(180deg, rgba(4, 20, 39, 0.92) 0%, rgba(4, 20, 39, 0.80) 72%, rgba(4, 20, 39, 0) 100%);
    }

    .chips-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 12px 8px 2px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
    }

    .chips-bar::-webkit-scrollbar {
      height: 6px;
    }

    .chips-bar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.16);
      border-radius: 999px;
    }

    .chips-bar::after {
      content: "";
      flex: 0 0 14px;
    }

    .category-chip {
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 12px 17px;
      background: rgba(255, 255, 255, 0.98);
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .category-chip.active {
      color: #fff;
      background: linear-gradient(135deg, #0d2742, #18466f);
      border-color: rgba(255, 255, 255, 0.14);
    }

    #status {
      text-align: center;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.72);
      margin: 12px 0 18px;
    }

    #menu {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .menu-section {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow: var(--shadow-soft);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.995), rgba(248, 244, 238, 0.985));
      scroll-margin-top: var(--sticky-offset);
      isolation: isolate;
    }

    .menu-section::before,
    .menu-section::after {
      content: "";
      position: absolute;
      pointer-events: none;
      background-repeat: no-repeat;
      background-size: contain;
      z-index: 0;
    }

    .menu-section::before {
      width: 132px;
      height: 182px;
      top: 12px;
      right: -16px;
      background-image: var(--fish-art);
      opacity: 0.09;
      transform: rotate(-7deg);
    }

    .menu-section::after {
      width: 134px;
      height: 134px;
      left: -26px;
      bottom: -10px;
      background-image: var(--shell-art);
      opacity: 0.08;
    }

    .menu-section.theme-ara-sicaklar::before,
    .menu-section.theme-icecekler::before {
      background-image: var(--coral-art);
      width: 104px;
      height: 152px;
      opacity: 0.09;
    }

    .menu-section.theme-ana-yemekler::after,
    .menu-section.theme-ickiler::after {
      background-image: var(--fish-art);
      left: auto;
      right: -18px;
      bottom: -14px;
      transform: rotate(180deg);
    }

    .menu-section.theme-salatalar::before {
      background-image: var(--shell-art);
      width: 116px;
      height: 116px;
      right: 8px;
      top: 16px;
    }

    .menu-section.theme-tatlilar::after {
      background-image: var(--coral-art);
      width: 94px;
      height: 132px;
      left: -8px;
      bottom: -12px;
    }

    .section-toggle {
      position: relative;
      z-index: 1;
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      color: var(--text);
      padding: 28px 24px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
    }

    .section-left {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      min-width: 0;
    }

    .section-title-wrap {
      min-width: 0;
    }

    .section-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 44px;
      line-height: 0.92;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--navy);
    }

    .section-arrow {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(13, 39, 66, 0.06);
      color: var(--navy);
      font-size: 16px;
      transition: transform .22s ease, background .22s ease;
    }

    .menu-section.open .section-arrow {
      transform: rotate(180deg);
      background: var(--gold-soft);
    }

    .section-content {
      position: relative;
      z-index: 1;
      display: none;
      padding: 0 24px 24px;
    }

    .menu-section.open .section-content {
      display: block;
    }

    .section-content::before {
      content: "";
      display: block;
      height: 1px;
      margin-bottom: 12px;
      background: linear-gradient(90deg, rgba(200, 165, 106, 0.60), rgba(13, 39, 66, 0.12), rgba(13, 39, 66, 0));
    }

    .items-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0 22px;
    }

    .menu-section.theme-ana-yemekler.open .items-grid,
    .menu-section.theme-ickiler.open .items-grid {
      grid-template-columns: 1fr 1fr;
    }

    .menu-item {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      padding: 13px 0 14px;
      border-bottom: 1px solid var(--line);
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .item-name-wrap {
      min-width: 0;
    }

    .item-name {
      font-size: 15px;
      line-height: 1.45;
      font-weight: 700;
      color: #102742;
    }

    .item-description {
      margin-top: 4px;
      max-width: 95%;
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted);
    }

    .item-price {
      align-self: start;
      white-space: nowrap;
      font-size: 12px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--navy);
      padding: 9px 0 0 12px;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      color: rgba(255, 255, 255, 0.64);
      font-size: 12px;
      line-height: 1.5;
      padding-bottom: 8px;
    }

    @media (max-width: 680px) {

      .menu-section.theme-ana-yemekler.open .items-grid,
      .menu-section.theme-ickiler.open .items-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .shell {
        padding: 14px 10px 38px;
      }

      .hero {
        padding: 22px 16px 18px;
        border-radius: 28px;
      }

      .hero-top {
        gap: 12px;
      }

      h1 {
        font-size: 50px;
      }

      .hero-subtitle {
        max-width: 220px;
        font-size: 13px;
      }

      .hero-seal {
        width: 74px;
        height: 74px;
      }

      .section-toggle {
        padding: 24px 18px 16px;
      }

      .section-content {
        padding: 0 18px 18px;
      }

      .section-title {
        font-size: 36px;
      }

      .menu-section::before {
        width: 108px;
        height: 146px;
        opacity: 0.08;
      }

      .menu-section::after {
        width: 100px;
        height: 100px;
        opacity: 0.07;
      }

      .menu-item {
        gap: 10px;
        padding: 12px 0 13px;
      }

      .item-name {
        font-size: 15px;
      }

      .item-price {
        font-size: 12px;
      }
    }
  </style>
</head>

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result.map(item => item.replace(/^"|"$/g, ""));
    }

    function getCategoryMetaBySheetKey(sheetKey) {
      if (currentLang === "tr") {
        return categoryConfig.find(cat => cat.trKey === sheetKey);
      }
      return categoryConfig.find(cat => cat.enKey === sheetKey);
    }

    function getCurrentCategories() {
      return categoryConfig.map(cat => ({
        id: cat.id,
        key: currentLang === "tr" ? cat.trKey : cat.enKey,
        label: currentLang === "tr" ? cat.trLabel : cat.enLabel
      }));
    }

    function updateStaticTexts() {
      const t = uiText[currentLang];
      document.getElementById("hero-subtitle").innerText = t.subtitle;
      document.getElementById("hero-note").innerText = t.heroNote;
      document.getElementById("footer-note").innerText = t.footer;
    }

    function updateActiveChip() {
      document.querySelectorAll(".category-chip").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.categoryId === currentOpenCategoryId);
      });
    }

    function closeAllSections() {
      document.querySelectorAll(".menu-section").forEach(section => section.classList.remove("open"));
    }

    function openSectionById(categoryId) {
      const section = document.querySelector(`.menu-section[data-category-id="${categoryId}"]`);
      if (!section) return;

      closeAllSections();
      section.classList.add("open");
      currentOpenCategoryId = categoryId;
      updateActiveChip();
    }

    function scrollToSectionById(categoryId) {
      const section = document.querySelector(`.menu-section[data-category-id="${categoryId}"]`);
      if (!section) return;

      setTimeout(() => {
        section.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 60);
    }

    function goToCategory(categoryId) {
      openSectionById(categoryId);
      scrollToSectionById(categoryId);
    }

    function toggleCategory(categoryId) {
      const section = document.querySelector(`.menu-section[data-category-id="${categoryId}"]`);
      if (!section) return;

      const isOpen = section.classList.contains("open");

      if (isOpen) {
        section.classList.remove("open");
        currentOpenCategoryId = null;
        updateActiveChip();
      } else {
        openSectionById(categoryId);
      }
    }

    function buildCategoryChips(visibleCategoryIds) {
      const chipsContainer = document.getElementById("category-chips");
      chipsContainer.innerHTML = "";

      getCurrentCategories()
        .filter(cat => visibleCategoryIds.includes(cat.id))
        .forEach(category => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "category-chip";
          btn.innerText = category.label;
          btn.dataset.categoryId = category.id;
          btn.addEventListener("click", () => goToCategory(category.id));
          chipsContainer.appendChild(btn);
        });

      updateActiveChip();
    }

    function renderMenu() {
      const menuDiv = document.getElementById("menu");
      menuDiv.innerHTML = "";
      const grouped = {};
      const visibleCategoryIds = [];

      allItems.forEach(item => {
        const sheetCategory = currentLang === "tr" ? item.category_tr : item.category_en;
        const meta = getCategoryMetaBySheetKey(sheetCategory);
        if (!meta) return;

        if (!grouped[meta.id]) {
          grouped[meta.id] = [];
          visibleCategoryIds.push(meta.id);
        }

        grouped[meta.id].push({
          product: currentLang === "tr" ? item.product_tr : item.product_en,
          description: currentLang === "tr" ? item.description_tr : item.description_en,
          price: item.price,
          sort_order: item.sort_order
        });
      });

      getCurrentCategories().filter(category => grouped[category.id]).forEach(category => {
        grouped[category.id].sort((a, b) => a.sort_order - b.sort_order);

        const section = document.createElement("section");
        section.className = `menu-section theme-${category.id}`;
        section.dataset.categoryId = category.id;

        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "section-toggle";
        toggle.addEventListener("click", () => toggleCategory(category.id));

        const left = document.createElement("div");
        left.className = "section-left";

        const titleWrap = document.createElement("div");
        titleWrap.className = "section-title-wrap";

        const title = document.createElement("div");
        title.className = "section-title";
        title.innerText = category.label;

        titleWrap.appendChild(title);
        left.appendChild(titleWrap);

        const arrow = document.createElement("div");
        arrow.className = "section-arrow";
        arrow.innerText = "⌄";

        toggle.appendChild(left);
        toggle.appendChild(arrow);

        const content = document.createElement("div");
        content.className = "section-content";

        const grid = document.createElement("div");
        grid.className = "items-grid";

        grouped[category.id].forEach(item => {
          const row = document.createElement("div");
          row.className = "menu-item";

          const nameWrap = document.createElement("div");
          nameWrap.className = "item-name-wrap";

          const name = document.createElement("div");
          name.className = "item-name";
          name.innerText = item.product || "";
          nameWrap.appendChild(name);

          if (item.description) {
            const desc = document.createElement("div");
            desc.className = "item-description";
            desc.innerText = item.description;
            nameWrap.appendChild(desc);
          }

          const price = document.createElement("div");
          price.className = "item-price";
          price.innerText = item.price === "AG" ? "AG" : item.price + " TL";

          row.appendChild(nameWrap);
          row.appendChild(price);
          grid.appendChild(row);
        });

        content.appendChild(grid);
        section.appendChild(toggle);
        section.appendChild(content);
        menuDiv.appendChild(section);
      });

      buildCategoryChips(visibleCategoryIds);
      if (!currentOpenCategoryId || !visibleCategoryIds.includes(currentOpenCategoryId)) currentOpenCategoryId = visibleCategoryIds[0] || null;
      if (currentOpenCategoryId) openSectionById(currentOpenCategoryId);
    }

    fetch(sheetURL)
      .then(response => {
        if (!response.ok) throw new Error("Veri alınamadı. Status: " + response.status);
        return response.text();
      })
      .then(data => {
        const rows = data.trim().split("\n").slice(1);
        allItems = [];
        rows.forEach(row => {
          const cols = parseCSVLine(row);
          const item = {
            id: cols[0] || "",
            category_tr: cols[1] || "",
            category_en: cols[2] || "",
            product_tr: cols[3] || "",
            product_en: cols[4] || "",
            description_tr: cols[5] || "",
            description_en: cols[6] || "",
            price: cols[7] || "",
            status: cols[8] || "",
            sort_order: Number(cols[9]) || 0
          };
          if (item.status === "active") allItems.push(item);
        });
        document.getElementById("status").innerText = "";
        updateStaticTexts();
        renderMenu();
      })
      .catch(error => {
        document.getElementById("status").innerText = `${uiText[currentLang].errorPrefix} ${error.message}`;
      });

    document.getElementById("tr-btn").addEventListener("click", () => {
      currentLang = "tr";
      document.getElementById("tr-btn").classList.add("active");
      document.getElementById("en-btn").classList.remove("active");
      currentOpenCategoryId = null;
      updateStaticTexts();
      renderMenu();
    });

    document.getElementById("en-btn").addEventListener("click", () => {
      currentLang = "en";
      document.getElementById("en-btn").classList.add("active");
      document.getElementById("tr-btn").classList.remove("active");
      currentOpenCategoryId = null;
      updateStaticTexts();
      renderMenu();
    });
  </script>
</body>

</html>
