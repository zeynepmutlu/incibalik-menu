<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İnci Balık Menü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #041427;
      --bg-2: #08203b;
      --bg-3: #0d2b4d;
      --navy: #102d4b;
      --navy-soft: #173d66;
      --gold: #c8a56a;
      --gold-soft: rgba(200, 165, 106, 0.18);
      --line: rgba(16, 39, 66, 0.10);
      --shadow: 0 24px 60px rgba(0, 8, 18, 0.34);
      --shadow-soft: 0 14px 32px rgba(0, 10, 22, 0.18);
      --sticky-offset: 88px;
      --hero-art: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 320'%3E%3Cg fill='none' stroke='%23c8a56a' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round' opacity='0.95'%3E%3Cpath d='M112 20 C80 70 63 122 68 185 C72 238 95 278 110 300 C126 277 149 236 152 184 C155 132 139 76 112 20Z'/%3E%3Cpath d='M110 299 C80 260 44 244 18 250 C40 225 53 205 57 181 C39 152 28 128 18 101 C46 111 83 101 109 74'/%3E%3Cpath d='M111 299 C141 260 177 244 203 250 C181 225 168 205 164 181 C182 152 193 128 203 101 C175 111 138 101 112 74'/%3E%3Cpath d='M97 57 C114 79 123 107 125 150 C126 192 121 236 111 279'/%3E%3Cpath d='M91 89 C112 102 126 123 130 168'/%3E%3Cpath d='M87 123 C105 136 117 155 121 193'/%3E%3Cpath d='M82 159 C98 171 109 186 112 212'/%3E%3Cpath d='M75 197 C89 208 98 219 101 240'/%3E%3Cpath d='M123 92 C104 105 94 127 90 170'/%3E%3Cpath d='M129 127 C113 140 103 160 100 194'/%3E%3Cpath d='M134 163 C120 174 111 191 108 214'/%3E%3Ccircle cx='125' cy='92' r='4.2'/%3E%3C/g%3E%3C/svg%3E");
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: #f7f7f7;
      background:
        radial-gradient(circle at 20% 0%, rgba(200, 165, 106, 0.12), transparent 0 18%),
        radial-gradient(circle at 88% 18%, rgba(25, 69, 113, 0.30), transparent 0 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
    }

    .shell {
      width: 100%;
      padding: 20px 14px 44px;
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      padding: 24px 22px 22px;
      margin-bottom: 16px;
      color: #fff;
      background:
        radial-gradient(circle at 86% 12%, rgba(255, 255, 255, 0.08), transparent 0 16%),
        linear-gradient(145deg, rgba(7, 22, 40, 0.98), rgba(14, 45, 76, 0.96));
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.08);
      isolation: isolate;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: auto 18px -18px auto;
      width: 150px;
      height: 150px;
      background-image: var(--hero-art);
      background-repeat: no-repeat;
      background-size: contain;
      opacity: 0.05;
      transform: rotate(-6deg);
      pointer-events: none;
      z-index: 0;
    }

    .hero-top {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
    }

    .brand-block {
      min-width: 0;
      padding-top: 2px;
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 56px;
      line-height: 0.92;
      letter-spacing: 0.01em;
      font-weight: 700;
    }

    .hero-subtitle {
      margin-top: 14px;
      max-width: 300px;
      font-size: 15px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.84);
    }

    .hero-note {
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.90);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      padding: 10px 16px;
      letter-spacing: 0.03em;
      position: relative;
      z-index: 1;
    }

    .hero-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
      min-width: 126px;
    }

    .hero-seal {
      width: 132px;
      display: block;
      position: relative;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.18));
    }

    .hero-logo-img {
      width: 100%;
      height: auto;
      display: block;
    }

    .lang-switch {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .lang-btn {
      min-width: 52px;
      border-radius: 999px;
      padding: 10px 15px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: 0.2s ease;
    }

    .lang-btn.active {
      background: #fff;
      color: var(--navy);
      border-color: #fff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }

    .chips-wrap {
      position: sticky;
      top: 4px;
      z-index: 60;
      margin-bottom: 16px;
      padding: 6px 0 8px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: linear-gradient(180deg, rgba(4, 20, 39, 0.94) 0%, rgba(4, 20, 39, 0.82) 68%, rgba(4, 20, 39, 0) 100%);
    }

    .chips-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 8px 8px 2px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .chips-bar::-webkit-scrollbar {
      display: none;
    }

    .chips-bar::after {
      content: "";
      flex: 0 0 10px;
    }

    .category-chip {
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.98);
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .category-chip.active {
      color: #fff;
      background: linear-gradient(135deg, #0d2742, #18466f);
      border-color: rgba(255, 255, 255, 0.14);
    }

    #status {
      text-align: center;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.72);
      margin: 12px 0 18px;
    }

    #menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .menu-section {
      position: relative;
      overflow: hidden;
      border-radius: 0;
      border: 1px solid rgba(200, 165, 106, 0.78);
      box-shadow: none;
      background: linear-gradient(180deg, rgba(5, 22, 42, 0.98), rgba(7, 27, 51, 0.98));
      scroll-margin-top: calc(var(--sticky-offset) + 10px);
      isolation: isolate;
    }

    .menu-section::before,
    .menu-section::after {
      content: "";
      position: absolute;
      left: 26px;
      right: 26px;
      height: 1px;
      background: rgba(200, 165, 106, 0.55);
      pointer-events: none;
      z-index: 0;
    }

    .menu-section::before {
      top: 26px;
    }

    .menu-section::after {
      bottom: 26px;
    }

    .section-toggle {
      position: relative;
      z-index: 1;
      width: 100%;
      border: none;
      background: transparent;
      text-align: center;
      color: #fff;
      padding: 52px 22px 48px;
      display: block;
      cursor: pointer;
      min-height: 210px;
    }

    .section-left,
    .section-title-wrap {
      display: block;
    }

    .section-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 68px;
      line-height: 0.9;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f7f1e8;
      text-align: center;
      word-break: break-word;
      text-wrap: balance;
    }

    .section-arrow {
      width: 28px;
      height: 28px;
      margin: 18px auto 0;
      display: grid;
      place-items: center;
      color: rgba(247, 241, 232, 0.78);
      font-size: 16px;
      transition: transform .22s ease, opacity .22s ease;
    }

    .menu-section.open .section-arrow {
      transform: rotate(180deg);
    }

    .section-content {
      position: relative;
      z-index: 1;
      display: none;
      padding: 0 36px 42px;
    }

    .menu-section.open .section-content {
      display: block;
    }

    .section-content::before {
      content: "";
      display: block;
      width: 56%;
      max-width: 420px;
      height: 1px;
      margin: 0 auto 24px;
      background: rgba(200, 165, 106, 0.52);
    }

    .items-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }

    .menu-item {
      display: block;
      text-align: center;
      padding: 18px 0;
      border-bottom: none;
    }

    .menu-item+.menu-item {
      margin-top: 2px;
    }

    .item-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 28px;
      line-height: 1.12;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f7f1e8;
    }

    .item-description {
      margin: 8px auto 0;
      max-width: 92%;
      font-size: 14px;
      line-height: 1.7;
      color: rgba(247, 241, 232, 0.70);
      font-style: italic;
      font-weight: 400;
    }

    .item-price {
      display: block;
      margin-top: 8px;
      font-size: 17px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #f0dfbf;
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: rgba(247, 241, 232, 0.72);
      font-size: 13px;
      line-height: 1.6;
      padding-bottom: 0;
    }

    .site-footer {
      margin-top: 18px;
      padding: 12px 0 6px;
    }

    .site-footer-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 165, 106, 0.65), transparent);
      margin-bottom: 12px;
    }

    .site-footer-signature {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.01em;
      color: rgba(247, 241, 232, 0.74);
      text-transform: none;
    }

    @media (max-width: 680px) {
      .section-title {
        font-size: 54px;
      }

      .item-name {
        font-size: 26px;
      }
    }

    @media (max-width: 520px) {
      :root {
        --sticky-offset: 84px;
      }

      .shell {
        padding: 14px 10px 32px;
      }

      .hero {
        padding: 18px 16px 18px;
        border-radius: 28px;
      }

      .hero-top {
        grid-template-columns: minmax(0, 1fr) 108px;
        gap: 14px;
      }

      h1 {
        font-size: 40px;
      }

      .hero-subtitle {
        max-width: 100%;
        font-size: 12px;
        line-height: 1.5;
        margin-top: 10px;
      }

      .hero-note {
        margin-top: 16px;
        font-size: 11px;
        padding: 9px 14px;
      }

      .hero-right {
        min-width: 108px;
        gap: 10px;
      }

      .hero-seal {
        width: 108px;
      }

      .lang-btn {
        min-width: 48px;
        padding: 9px 12px;
      }

      .chips-wrap {
        top: 0;
        margin-bottom: 12px;
        padding: 4px 0 8px;
      }

      .chips-bar {
        gap: 8px;
        padding: 2px 6px 8px 2px;
      }

      .category-chip {
        padding: 9px 16px;
        font-size: 12px;
      }

      #menu {
        gap: 12px;
      }

      .menu-section::before,
      .menu-section::after {
        left: 20px;
        right: 20px;
      }

      .menu-section::before {
        top: 18px;
      }

      .menu-section::after {
        bottom: 18px;
      }

      .section-toggle {
        padding: 34px 16px 34px;
        min-height: 136px;
      }

      .section-title {
        font-size: 34px;
        line-height: 0.95;
        letter-spacing: 0.06em;
      }

      .section-arrow {
        margin-top: 12px;
        font-size: 14px;
      }

      .section-content {
        padding: 0 22px 30px;
      }

      .section-content::before {
        width: 60%;
        margin-bottom: 18px;
      }

      .menu-item {
        padding: 14px 0;
      }

      .item-name {
        font-size: 24px;
        line-height: 1.08;
      }

      .item-description {
        font-size: 12px;
        line-height: 1.6;
      }

      .item-price {
        margin-top: 6px;
        font-size: 15px;
      }

      .footer-note {
        margin-top: 14px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="container">
      <header class="hero">
        <div class="hero-top">
          <div class="brand-block">
            <h1 id="site-title">İnci Balık</h1>
            <div class="hero-subtitle" id="hero-subtitle">Seçkin deniz ürünleri menüsü.</div>
            <div class="hero-note" id="hero-note">QR menü • Güncel fiyatlar</div>
          </div>

          <div class="hero-right">
            <div class="hero-seal" aria-hidden="true">
              <img class="hero-logo-img" src="./incibaliklogo.png" alt="İnci Balık Logo">
            </div>
            <div class="lang-switch">
              <button id="tr-btn" class="lang-btn active" type="button">TR</button>
              <button id="en-btn" class="lang-btn" type="button">EN</button>
            </div>
          </div>
        </div>
      </header>

      <div class="chips-wrap">
        <div class="chips-bar" id="category-chips"></div>
      </div>

      <div id="status">Yükleniyor...</div>
      <div id="menu"></div>

      <div class="footer-note" id="footer-note">Afiyetle.</div>
      <footer class="site-footer">
        <div class="site-footer-line"></div>
        <div class="site-footer-signature">Designed by Zeynep Mutlu</div>
      </footer>
    </div>
  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJd-Y9GNyfAtMHUGYPIgUvEK1xrYHm05tx_RT-rsA6586Fmb6aoScfbDsje_34ojF81ZDDD5nNWLJk/pub?gid=0&single=true&output=csv";

    let currentLang = "tr";
    let allItems = [];
    let currentOpenCategoryId = null;

    const uiText = {
      tr: {
        subtitle: "Seçkin deniz ürünleri menüsü.",
        heroNote: "QR menü • Güncel fiyatlar",
        footer: "Afiyetle.",
        errorPrefix: "Hata:"
      },
      en: {
        subtitle: "Refined seafood menu.",
        heroNote: "QR menu • Updated prices",
        footer: "Bon appétit.",
        errorPrefix: "Error:"
      }
    };

    const categoryConfig = [
      { id: "mezeler", trKey: "Mezeler", enKey: "Mezes", trLabel: "Mezeler", enLabel: "Mezes" },
      { id: "ara-sicaklar", trKey: "Ara Sıcaklar", enKey: "Hot Starters", trLabel: "Ara Sıcaklar", enLabel: "Hot Starters" },
      { id: "ana-yemekler", trKey: "Ana Yemekler", enKey: "Main Courses", trLabel: "Ana Yemekler", enLabel: "Main Courses" },
      { id: "salatalar", trKey: "Salatalar", enKey: "Salads", trLabel: "Salatalar", enLabel: "Salads" },
      { id: "tatlilar", trKey: "Tatlılar", enKey: "Desserts", trLabel: "Tatlılar", enLabel: "Desserts" },
      { id: "icecekler", trKey: "İçecekler", enKey: "Drinks", trLabel: "İçecekler", enLabel: "Drinks" },
      { id: "ickiler", trKey: "Alkollü İçecekler", enKey: "Alcoholic Drinks", trLabel: "İçkiler", enLabel: "Alcohol" }
    ];

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result.map(item => item.replace(/^"|"$/g, ""));
    }

    function getCategoryMetaBySheetKey(sheetKey) {
      if (currentLang === "tr") return categoryConfig.find(cat => cat.trKey === sheetKey);
      return categoryConfig.find(cat => cat.enKey === sheetKey);
    }

    function getCurrentCategories() {
      return categoryConfig.map(cat => ({
        id: cat.id,
        key: currentLang === "tr" ? cat.trKey : cat.enKey,
        label: currentLang === "tr" ? cat.trLabel : cat.enLabel
      }));
    }

    function updateStaticTexts() {
      const t = uiText[currentLang];
      document.getElementById("hero-subtitle").innerText = t.subtitle;
      document.getElementById("hero-note").innerText = t.heroNote;
      document.getElementById("footer-note").innerText = t.footer;
    }

    function updateActiveChip() {
      document.querySelectorAll(".category-chip").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.categoryId === currentOpenCategoryId);
      });
    }

    function closeAllSections() {
      document.querySelectorAll(".menu-section").forEach(section => section.classList.remove("open"));
    }

    function getScrollTarget(section) {
      const chipsWrap = document.querySelector('.chips-wrap');
      const chipsHeight = chipsWrap ? chipsWrap.offsetHeight : 0;
      const extraGap = window.innerWidth <= 520 ? 10 : 16;
      return Math.max(0, window.scrollY + section.getBoundingClientRect().top - chipsHeight - extraGap);
    }

    function scrollToSection(section) {
      const targetTop = getScrollTarget(section);
      window.scrollTo({ top: targetTop, behavior: 'smooth' });
    }

    function openSectionById(categoryId, shouldScroll = false) {
      const section = document.querySelector(`.menu-section[data-category-id="${categoryId}"]`);
      if (!section) return;

      closeAllSections();
      section.classList.add("open");
      currentOpenCategoryId = categoryId;
      updateActiveChip();

      if (shouldScroll) {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => scrollToSection(section));
        });
      }
    }

    function goToCategory(categoryId) {
      openSectionById(categoryId, true);
    }

    function toggleCategory(categoryId) {
      const section = document.querySelector(`.menu-section[data-category-id="${categoryId}"]`);
      if (!section) return;

      const isOpen = section.classList.contains("open");
      if (isOpen) {
        section.classList.remove("open");
        currentOpenCategoryId = null;
        updateActiveChip();
      } else {
        openSectionById(categoryId, true);
      }
    }

    function buildCategoryChips(visibleCategoryIds) {
      const chipsContainer = document.getElementById("category-chips");
      chipsContainer.innerHTML = "";

      getCurrentCategories()
        .filter(cat => visibleCategoryIds.includes(cat.id))
        .forEach(category => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "category-chip";
          btn.innerText = category.label;
          btn.dataset.categoryId = category.id;
          btn.addEventListener("click", () => goToCategory(category.id));
          chipsContainer.appendChild(btn);
        });

      updateActiveChip();
    }

    function renderMenu() {
      const menuDiv = document.getElementById("menu");
      menuDiv.innerHTML = "";
      const grouped = {};
      const visibleCategoryIds = [];

      allItems.forEach(item => {
        const sheetCategory = currentLang === "tr" ? item.category_tr : item.category_en;
        const meta = getCategoryMetaBySheetKey(sheetCategory);
        if (!meta) return;

        if (!grouped[meta.id]) {
          grouped[meta.id] = [];
          visibleCategoryIds.push(meta.id);
        }

        grouped[meta.id].push({
          product: currentLang === "tr" ? item.product_tr : item.product_en,
          description: currentLang === "tr" ? item.description_tr : item.description_en,
          price: item.price,
          sort_order: item.sort_order
        });
      });

      getCurrentCategories().filter(category => grouped[category.id]).forEach(category => {
        grouped[category.id].sort((a, b) => a.sort_order - b.sort_order);

        const section = document.createElement("section");
        section.className = `menu-section theme-${category.id}`;
        section.dataset.categoryId = category.id;

        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "section-toggle";
        toggle.addEventListener("click", () => toggleCategory(category.id));

        const left = document.createElement("div");
        left.className = "section-left";

        const titleWrap = document.createElement("div");
        titleWrap.className = "section-title-wrap";

        const title = document.createElement("div");
        title.className = "section-title";
        title.innerText = category.label;

        titleWrap.appendChild(title);
        left.appendChild(titleWrap);

        const arrow = document.createElement("div");
        arrow.className = "section-arrow";
        arrow.innerText = "⌄";

        toggle.appendChild(left);
        toggle.appendChild(arrow);

        const content = document.createElement("div");
        content.className = "section-content";

        const grid = document.createElement("div");
        grid.className = "items-grid";

        grouped[category.id].forEach(item => {
          const row = document.createElement("div");
          row.className = "menu-item";

          const nameWrap = document.createElement("div");
          nameWrap.className = "item-name-wrap";

          const name = document.createElement("div");
          name.className = "item-name";
          name.innerText = item.product || "";
          nameWrap.appendChild(name);

          if (item.description) {
            const desc = document.createElement("div");
            desc.className = "item-description";
            desc.innerText = item.description;
            nameWrap.appendChild(desc);
          }

          const price = document.createElement("div");
          price.className = "item-price";
          price.innerText = item.price === "AG" ? "AG" : `${item.price} TL`;

          row.appendChild(nameWrap);
          row.appendChild(price);
          grid.appendChild(row);
        });

        content.appendChild(grid);
        section.appendChild(toggle);
        section.appendChild(content);
        menuDiv.appendChild(section);
      });

      buildCategoryChips(visibleCategoryIds);
      if (!currentOpenCategoryId || !visibleCategoryIds.includes(currentOpenCategoryId)) {
        currentOpenCategoryId = visibleCategoryIds[0] || null;
      }
      if (currentOpenCategoryId) openSectionById(currentOpenCategoryId, false);
    }

    fetch(sheetURL)
      .then(response => {
        if (!response.ok) throw new Error("Veri alınamadı. Status: " + response.status);
        return response.text();
      })
      .then(data => {
        const rows = data.trim().split("\n").slice(1);
        allItems = [];
        rows.forEach(row => {
          const cols = parseCSVLine(row);
          const item = {
            id: cols[0] || "",
            category_tr: cols[1] || "",
            category_en: cols[2] || "",
            product_tr: cols[3] || "",
            product_en: cols[4] || "",
            description_tr: cols[5] || "",
            description_en: cols[6] || "",
            price: cols[7] || "",
            status: cols[8] || "",
            sort_order: Number(cols[9]) || 0
          };
          if (item.status === "active") allItems.push(item);
        });
        document.getElementById("status").innerText = "";
        updateStaticTexts();
        renderMenu();
      })
      .catch(error => {
        document.getElementById("status").innerText = `${uiText[currentLang].errorPrefix} ${error.message}`;
      });

    document.getElementById("tr-btn").addEventListener("click", () => {
      currentLang = "tr";
      document.getElementById("tr-btn").classList.add("active");
      document.getElementById("en-btn").classList.remove("active");
      currentOpenCategoryId = null;
      updateStaticTexts();
      renderMenu();
    });

    document.getElementById("en-btn").addEventListener("click", () => {
      currentLang = "en";
      document.getElementById("en-btn").classList.add("active");
      document.getElementById("tr-btn").classList.remove("active");
      currentOpenCategoryId = null;
      updateStaticTexts();
      renderMenu();
    });
  </script>
</body>

</html>
