<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İnci Balık Menü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #041427;
      --bg-2: #08203b;
      --bg-3: #0d2b4d;
      --navy: #102d4b;
      --gold: #c8a56a;
      --shadow: 0 24px 60px rgba(0, 8, 18, 0.34);
      --sticky-offset: 84px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: #f7f7f7;
      background:
        radial-gradient(circle at 20% 0%, rgba(200, 165, 106, 0.10), transparent 0 18%),
        radial-gradient(circle at 88% 18%, rgba(25, 69, 113, 0.26), transparent 0 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
    }

    .shell {
      width: 100%;
      padding: 16px 12px 36px;
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      min-height: 360px;
      margin-bottom: 12px;
      color: #fff;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.08);
      isolation: isolate;
      background:
        linear-gradient(145deg, rgba(7, 22, 40, 0.98), rgba(14, 45, 76, 0.96));
    }

    .hero-bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 34%;
      z-index: 0;
      display: block;
      opacity: 1;
      transform: scale(1.02);
      filter: saturate(0.95) blur(0.4px);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(4, 13, 25, 0.28) 0%, rgba(4, 13, 25, 0.38) 32%, rgba(4, 13, 25, 0.76) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      min-height: 360px;
      padding: 18px 18px 24px;
      display: flex;
      flex-direction: column;
    }

    .hero-topbar {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
    }

    .lang-switch {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(10, 20, 35, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .lang-btn {
      min-width: 52px;
      border-radius: 999px;
      padding: 9px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .lang-btn.active {
      background: rgba(255, 255, 255, 0.96);
      color: var(--navy);
      border-color: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
    }

    .hero-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 10px;
      padding: 8px 12px 4px;
    }

    .hero-seal {
      width: 68px;
      display: block;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.30));
    }

    .hero-logo-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 52px;
      line-height: 0.95;
      letter-spacing: 0.04em;
      font-weight: 700;
      text-transform: uppercase;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.42);
    }

    .hero-subtitle {
      font-size: 15px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.10em;
      text-transform: uppercase;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.36);
    }

    .hero-note {
      align-self: center;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(8, 18, 32, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      padding: 10px 15px;
      letter-spacing: 0.03em;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .chips-wrap {
      position: sticky;
      top: 4px;
      z-index: 60;
      margin-bottom: 12px;
      padding: 4px 0 8px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: linear-gradient(180deg, rgba(4, 20, 39, 0.94) 0%, rgba(4, 20, 39, 0.82) 68%, rgba(4, 20, 39, 0) 100%);
    }

    .chips-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 6px 8px 2px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .chips-bar::-webkit-scrollbar {
      display: none;
    }

    .chips-bar::after {
      content: "";
      flex: 0 0 8px;
    }

    .category-chip {
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 7px 13px;
      background: rgba(255, 255, 255, 0.98);
      color: var(--navy);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .category-chip.active {
      color: #fff;
      background: linear-gradient(135deg, #0d2742, #18466f);
      border-color: rgba(255, 255, 255, 0.14);
    }

    #status {
      text-align: center;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.72);
      margin: 12px 0 18px;
    }

    #menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-section {
      position: relative;
      overflow: hidden;
      border-radius: 0;
      border: 1px solid rgba(200, 165, 106, 0.78);
      background: linear-gradient(180deg, rgba(5, 22, 42, 0.98), rgba(7, 27, 51, 0.98));
      scroll-margin-top: calc(var(--sticky-offset) + 10px);
      isolation: isolate;
    }

    .menu-section::before,
    .menu-section::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      height: 1px;
      background: rgba(200, 165, 106, 0.55);
      pointer-events: none;
      z-index: 0;
    }

    .menu-section::before {
      top: 18px;
    }

    .menu-section::after {
      bottom: 18px;
    }

    .section-toggle {
      position: relative;
      z-index: 1;
      width: 100%;
      border: none;
      background: transparent;
      text-align: center;
      color: #fff;
      padding: 30px 18px 28px;
      display: block;
      cursor: pointer;
      min-height: 126px;
    }

    .section-left,
    .section-title-wrap {
      display: block;
    }

    .section-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 36px;
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #f7f1e8;
      text-align: center;
      word-break: break-word;
      text-wrap: balance;
    }

    .section-arrow {
      width: 24px;
      height: 24px;
      margin: 12px auto 0;
      display: grid;
      place-items: center;
      color: rgba(247, 241, 232, 0.78);
      font-size: 15px;
      transition: transform .22s ease, opacity .22s ease;
    }

    .menu-section.open .section-arrow {
      transform: rotate(180deg);
    }

    .section-content {
      position: relative;
      z-index: 1;
      display: none;
      padding: 0 28px 34px;
    }

    .menu-section.open .section-content {
      display: block;
    }

    .section-content::before {
      content: "";
      display: block;
      width: 56%;
      max-width: 320px;
      height: 1px;
      margin: 0 auto 18px;
      background: rgba(200, 165, 106, 0.52);
    }

    .items-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }

    .menu-item {
      display: block;
      text-align: center;
      padding: 15px 0;
      border-bottom: none;
    }

    .menu-item+.menu-item {
      margin-top: 2px;
    }

    .item-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 25px;
      line-height: 1.12;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f7f1e8;
    }

    .item-description {
      margin: 8px auto 0;
      max-width: 92%;
      font-size: 13px;
      line-height: 1.65;
      color: rgba(247, 241, 232, 0.72);
      font-style: italic;
      font-weight: 400;
    }

    .item-price {
      display: block;
      margin-top: 8px;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #f0dfbf;
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      color: rgba(247, 241, 232, 0.72);
      font-size: 13px;
      line-height: 1.6;
      padding-bottom: 0;
    }

    .site-footer {
      margin-top: 18px;
      padding: 12px 0 6px;
    }

    .site-footer-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 165, 106, 0.65), transparent);
      margin-bottom: 12px;
    }

    .site-footer-signature {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.01em;
      color: rgba(247, 241, 232, 0.74);
      text-transform: none;
    }

    @media (max-width: 520px) {
      :root {
        --sticky-offset: 78px;
      }

      .shell {
        padding: 12px 10px 30px;
      }

      .hero {
        min-height: 330px;
        border-radius: 28px;
      }

      .hero-inner {
        min-height: 330px;
        padding: 14px 14px 20px;
      }

      .hero-seal {
        width: 60px;
      }

      h1 {
        font-size: 44px;
        letter-spacing: 0.035em;
      }

      .hero-subtitle {
        font-size: 13px;
        letter-spacing: 0.09em;
      }

      .hero-note {
        font-size: 10px;
        padding: 9px 13px;
      }

      .lang-btn {
        min-width: 48px;
        padding: 8px 13px;
      }

      .chips-wrap {
        margin-bottom: 10px;
      }

      .category-chip {
        padding: 7px 12px;
        font-size: 11px;
      }

      .menu-section::before,
      .menu-section::after {
        left: 14px;
        right: 14px;
      }

      .section-toggle {
        padding: 24px 14px 22px;
        min-height: 112px;
      }

      .section-title {
        font-size: 30px;
        letter-spacing: 0.045em;
      }

      .section-arrow {
        margin-top: 10px;
        font-size: 14px;
      }

      .section-content {
        padding: 0 20px 28px;
      }

      .section-content::before {
        margin-bottom: 16px;
      }

      .item-name {
        font-size: 22px;
      }

      .item-description {
        font-size: 12px;
      }

      .item-price {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="container">
      <header class="hero">
        <img class="hero-bg-img" src="./hero-bg.jpg" alt="İnci Balık masa görseli">
        <div class="hero-inner">
          <div class="hero-topbar">
            <div class="lang-switch">
              <button id="tr-btn" class="lang-btn active" type="button">TR</button>
              <button id="en-btn" class="lang-btn" type="button">EN</button>
            </div>
          </div>

          <div class="hero-center">
            <div class="hero-seal" aria-hidden="true">
              <img class="hero-logo-img" src="./incibaliklogo.png" alt="İnci Balık Logo">
            </div>
            <h1 id="site-title">İnci Balık</h1>
            <div class="hero-subtitle" id="hero-subtitle">Denizden Gelen Tatlar</div>
            <div class="hero-note" id="hero-note">QR menü • Güncel fiyatlar</div>
          </div>
        </div>
      </header>

      <div class="chips-wrap">
        <div class="chips-bar" id="category-chips"></div>
      </div>

      <div id="status">Yükleniyor...</div>
      <div id="menu"></div>

      <div class="footer-note" id="footer-note">Afiyetle.</div>
      <footer class="site-footer">
        <div class="site-footer-line"></div>
        <div class="site-footer-signature">Designed by Zeynep Mutlu</div>
      </footer>
    </div>
  </div>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJd-Y9GNyfAtMHUGYPIgUvEK1xrYHm05tx_RT-rsA6586Fmb6aoScfbDsje_34ojF81ZDDD5nNWLJk/pub?gid=0&single=true&output=csv";

    let currentLang = "tr";
    let allItems = [];
    let currentOpenCategoryId = null;

    const uiText = {
      tr: {
        subtitle: "Denizden Gelen Tatlar",
        heroNote: "QR menü • Güncel fiyatlar",
        footer: "Afiyetle.",
        errorPrefix: "Hata:"
      },
      en: {
        subtitle: "Flavours from the Sea",
        heroNote: "QR menu • Updated prices",
        footer: "Bon appétit.",
        errorPrefix: "Error:"
      }
    };

    const categoryConfig = [
      { id: "mezeler", trKey: "Mezeler", enKey: "Mezes", trLabel: "Mezeler", enLabel: "Mezes" },
      { id: "ara-sicaklar", trKey: "Ara Sıcaklar", enKey: "Hot Starters", trLabel: "Ara Sıcaklar", enLabel: "Hot Starters" },
      { id: "ana-yemekler", trKey: "Ana Yemekler", enKey: "Main Courses", trLabel: "Ana Yemekler", enLabel: "Main Courses" },
      { id: "salatalar", trKey: "Salatalar", enKey: "Salads", trLabel: "Salatalar", enLabel: "Salads" },
      { id: "tatlilar", trKey: "Tatlılar", enKey: "Desserts", trLabel: "Tatlılar", enLabel: "Desserts" },
      { id: "icecekler", trKey: "İçecekler", enKey: "Drinks", trLabel: "İçecekler", enLabel: "Drinks" },
      { id: "ickiler", trKey: "Alkollü İçecekler", enKey: "Alcoholic Drinks", trLabel: "İçkiler", enLabel: "Alcohol" }
    ];

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result.map(item => item.replace(/^"|"$/g, ""));
    }

    function getCategoryMetaBySheetKey(sheetKey) {
      if (currentLang === "tr") return categoryConfig.find(cat => cat.trKey === sheetKey);
      return categoryConfig.find(cat => cat.enKey === sheetKey);
    }

    function getCurrentCategories() {
      return categoryConfig.map(cat => ({
        id: cat.id,
        key: currentLang === "tr" ? cat.trKey : cat.enKey,
        label: currentLang === "tr" ? cat.trLabel : cat.enLabel
      }));
    }

    function updateStaticTexts() {
      const t = uiText[currentLang];
      document.getElementById("hero-subtitle").innerText = t.subtitle;
      document.getElementById("hero-note").innerText = t.heroNote;
      document.getElementById("footer-note").innerText = t.footer;
    }

    function updateActiveChip() {
      document.querySelectorAll(".category-chip").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.categoryId === currentOpenCategoryId);
      });
    }

    function closeAllSections() {
      document.querySelectorAll(".menu-section").forEach(section => section.classList.remove("open"));
    }

    function getScrollTarget(section) {
      const chipsWrap = document.querySelector(".chips-wrap");
      const chipsHeight = chipsWrap ? chipsWrap.offsetHeight : 0;
      const extraGap = window.innerWidth <= 520 ? 8 : 12;
      return Math.max(0, window.scrollY + section.getBoundingClientRect().top - chipsHeight - extraGap);
    }

    function scrollToSection(section) {
      const targetTop = getScrollTarget(section);
      window.scrollTo({ top: targetTop, behavior: "smooth" });
    }

    function openSectionById(categoryId, shouldScroll = false) {
      const section = document.querySelector(`.menu-section[data-category-id="${categoryId}"]`);
      if (!section) return;

      closeAllSections();
      section.classList.add("open");
      currentOpenCategoryId = categoryId;
      updateActiveChip();

      if (shouldScroll) {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => scrollToSection(section));
        });
      }
    }

    function goToCategory(categoryId) {
      openSectionById(categoryId, true);
    }

    function toggleCategory(categoryId) {
      const section = document.querySelector(`.menu-section[data-category-id="${categoryId}"]`);
      if (!section) return;

      const isOpen = section.classList.contains("open");
      if (isOpen) {
        section.classList.remove("open");
        currentOpenCategoryId = null;
        updateActiveChip();
      } else {
        openSectionById(categoryId, true);
      }
    }

    function buildCategoryChips(visibleCategoryIds) {
      const chipsContainer = document.getElementById("category-chips");
      chipsContainer.innerHTML = "";

      getCurrentCategories()
        .filter(cat => visibleCategoryIds.includes(cat.id))
        .forEach(category => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "category-chip";
          btn.innerText = category.label;
          btn.dataset.categoryId = category.id;
          btn.addEventListener("click", () => goToCategory(category.id));
          chipsContainer.appendChild(btn);
        });

      updateActiveChip();
    }

    function renderMenu() {
      const menuDiv = document.getElementById("menu");
      menuDiv.innerHTML = "";
      const grouped = {};
      const visibleCategoryIds = [];

      allItems.forEach(item => {
        const sheetCategory = currentLang === "tr" ? item.category_tr : item.category_en;
        const meta = getCategoryMetaBySheetKey(sheetCategory);
        if (!meta) return;

        if (!grouped[meta.id]) {
          grouped[meta.id] = [];
          visibleCategoryIds.push(meta.id);
        }

        grouped[meta.id].push({
          product: currentLang === "tr" ? item.product_tr : item.product_en,
          description: currentLang === "tr" ? item.description_tr : item.description_en,
          price: item.price,
          sort_order: item.sort_order
        });
      });

      getCurrentCategories().filter(category => grouped[category.id]).forEach(category => {
        grouped[category.id].sort((a, b) => a.sort_order - b.sort_order);

        const section = document.createElement("section");
        section.className = `menu-section theme-${category.id}`;
        section.dataset.categoryId = category.id;

        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "section-toggle";
        toggle.addEventListener("click", () => toggleCategory(category.id));

        const left = document.createElement("div");
        left.className = "section-left";

        const titleWrap = document.createElement("div");
        titleWrap.className = "section-title-wrap";

        const title = document.createElement("div");
        title.className = "section-title";
        title.innerText = category.label;

        titleWrap.appendChild(title);
        left.appendChild(titleWrap);

        const arrow = document.createElement("div");
        arrow.className = "section-arrow";
        arrow.innerText = "⌄";

        toggle.appendChild(left);
        toggle.appendChild(arrow);

        const content = document.createElement("div");
        content.className = "section-content";

        const grid = document.createElement("div");
        grid.className = "items-grid";

        grouped[category.id].forEach(item => {
          const row = document.createElement("div");
          row.className = "menu-item";

          const nameWrap = document.createElement("div");
          nameWrap.className = "item-name-wrap";

          const name = document.createElement("div");
          name.className = "item-name";
          name.innerText = item.product || "";
          nameWrap.appendChild(name);

          if (item.description) {
            const desc = document.createElement("div");
            desc.className = "item-description";
            desc.innerText = item.description;
            nameWrap.appendChild(desc);
          }

          const price = document.createElement("div");
          price.className = "item-price";
          price.innerText = item.price === "AG" ? "AG" : `${item.price} TL`;

          row.appendChild(nameWrap);
          row.appendChild(price);
          grid.appendChild(row);
        });

        content.appendChild(grid);
        section.appendChild(toggle);
        section.appendChild(content);
        menuDiv.appendChild(section);
      });

      buildCategoryChips(visibleCategoryIds);
      if (!currentOpenCategoryId || !visibleCategoryIds.includes(currentOpenCategoryId)) {
        currentOpenCategoryId = visibleCategoryIds[0] || null;
      }
      if (currentOpenCategoryId) openSectionById(currentOpenCategoryId, false);
    }

    fetch(sheetURL)
      .then(response => {
        if (!response.ok) throw new Error("Veri alınamadı. Status: " + response.status);
        return response.text();
      })
      .then(data => {
        const rows = data.trim().split("\n").slice(1);
        allItems = [];
        rows.forEach(row => {
          const cols = parseCSVLine(row);
          const item = {
            id: cols[0] || "",
            category_tr: cols[1] || "",
            category_en: cols[2] || "",
            product_tr: cols[3] || "",
            product_en: cols[4] || "",
            description_tr: cols[5] || "",
            description_en: cols[6] || "",
            price: cols[7] || "",
            status: cols[8] || "",
            sort_order: Number(cols[9]) || 0
          };
          if (item.status === "active") allItems.push(item);
        });
        document.getElementById("status").innerText = "";
        updateStaticTexts();
        renderMenu();
      })
      .catch(error => {
        document.getElementById("status").innerText = `${uiText[currentLang].errorPrefix} ${error.message}`;
      });

    document.getElementById("tr-btn").addEventListener("click", () => {
      currentLang = "tr";
      document.getElementById("tr-btn").classList.add("active");
      document.getElementById("en-btn").classList.remove("active");
      currentOpenCategoryId = null;
      updateStaticTexts();
      renderMenu();
    });

    document.getElementById("en-btn").addEventListener("click", () => {
      currentLang = "en";
      document.getElementById("en-btn").classList.add("active");
      document.getElementById("tr-btn").classList.remove("active");
      currentOpenCategoryId = null;
      updateStaticTexts();
      renderMenu();
    });
  </script>
</body>
