<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İnci Balık Menü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #041427;
      --bg-2: #08203b;
      --bg-3: #0d2b4d;
      --navy: #102d4b;
      --gold: #c8a56a;
      --gold-soft: #dcc08f;
      --shadow: 0 24px 60px rgba(0, 8, 18, 0.34);
      --sticky-offset: 132px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: #f7f7f7;
      background:
        radial-gradient(circle at 20% 0%, rgba(200, 165, 106, 0.10), transparent 0 18%),
        radial-gradient(circle at 88% 18%, rgba(25, 69, 113, 0.26), transparent 0 22%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 42%, var(--bg-3) 100%);
    }

    .shell {
      width: 100%;
      padding: 16px 12px 36px;
    }

    .container {
      max-width: 620px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 0;
      min-height: 360px;
      margin-bottom: 12px;
      color: #fff;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.08);
      isolation: isolate;
      background: linear-gradient(145deg, rgba(7, 22, 40, 0.98), rgba(14, 45, 76, 0.96));
    }

    .hero-bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 34%;
      display: block;
      z-index: 0;
      transform: scale(1.015);
      filter: saturate(1) blur(0.12px);
      opacity: 1;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg,
          rgba(4, 13, 25, 0.08) 0%,
          rgba(4, 13, 25, 0.12) 26%,
          rgba(4, 13, 25, 0.28) 62%,
          rgba(4, 13, 25, 0.44) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      min-height: 360px;
      padding: 18px 18px 22px;
      display: flex;
      flex-direction: column;
    }

    .hero-topbar {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      margin-bottom: 0;
      position: relative;
      z-index: 3;
    }

    .lang-switch {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 0;
      background: rgba(8, 18, 32, 0.34);
      border: 1px solid rgba(200, 165, 106, 0.42);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    .lang-btn {
      min-width: 50px;
      border-radius: 0;
      padding: 8px 10px;
      border: 1px solid rgba(200, 165, 106, 0.28);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.84);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .lang-btn.active {
      background: rgba(255, 255, 255, 0.94);
      color: var(--navy);
      border-color: rgba(255, 255, 255, 0.94);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
    }

    .hero-center {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4px 18px 18px;
    }

    .hero-brand {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding-top: 92px;
      margin-top: -12px;
    }

    .hero-logo-crop {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 232px;
      height: 122px;
      overflow: visible;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
    }

    .hero-logo-crop::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      width: 190px;
      height: 120px;
      background: radial-gradient(circle,
          rgba(255, 248, 230, 0.54) 0%,
          rgba(255, 245, 220, 0.24) 38%,
          rgba(255, 255, 255, 0.08) 58%,
          rgba(255, 255, 255, 0) 82%);
      filter: blur(16px);
      pointer-events: none;
      z-index: 0;
    }

    .hero-logo {
      position: relative;
      z-index: 1;
      width: 232px;
      height: auto;
      display: block;
      object-fit: contain;
      filter:
        drop-shadow(0 10px 24px rgba(0, 0, 0, 0.26)) drop-shadow(0 0 12px rgba(255, 244, 214, 0.16));
    }

    .hero-title-wrap {
      position: relative;
      z-index: 2;
      width: 100%;
    }

    .hero-title-wrap::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 54%;
      transform: translate(-50%, -50%);
      width: 88%;
      height: 118px;
      background: radial-gradient(ellipse at center,
          rgba(8, 18, 32, 0.16) 0%,
          rgba(8, 18, 32, 0.08) 46%,
          rgba(8, 18, 32, 0) 78%);
      filter: blur(12px);
      z-index: 0;
      pointer-events: none;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 60px;
      line-height: 0.95;
      letter-spacing: 0.04em;
      font-weight: 700;
      text-transform: uppercase;
      color: #fff8ee;
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.22),
        0 8px 24px rgba(0, 0, 0, 0.18),
        0 0 12px rgba(255, 244, 224, 0.06);
    }

    .hero-subtitle {
      font-size: 12px;
      line-height: 1.35;
      color: rgba(255, 244, 230, 0.88);
      letter-spacing: 0.03em;
      text-transform: none;
      font-style: italic;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.22);
    }

    .search-wrap {
      position: sticky;
      top: 4px;
      z-index: 65;
      margin-bottom: 8px;
      padding-top: 2px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: linear-gradient(180deg, rgba(4, 20, 39, 0.94) 0%, rgba(4, 20, 39, 0.82) 68%, rgba(4, 20, 39, 0) 100%);
    }

    .search-bar {
      position: relative;
    }

    .search-input {
      width: 100%;
      height: 50px;
      border-radius: 0;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(8, 18, 32, 0.34);
      color: #fff;
      padding: 0 18px 0 48px;
      font-size: 14px;
      outline: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.12);
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.62);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.76);
      font-size: 16px;
      pointer-events: none;
    }

    .chips-wrap {
      position: sticky;
      top: 62px;
      z-index: 60;
      margin-bottom: 12px;
      padding: 4px 0 8px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: linear-gradient(180deg, rgba(4, 20, 39, 0.94) 0%, rgba(4, 20, 39, 0.82) 68%, rgba(4, 20, 39, 0) 100%);
    }

    .chips-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 6px 8px 2px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .chips-bar::-webkit-scrollbar {
      display: none;
    }

    .chips-bar::after {
      content: "";
      flex: 0 0 8px;
    }

    .category-chip {
      flex: 0 0 auto;
      border: 1px solid rgba(200, 165, 106, 0.78);
      border-radius: 0;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.98);
      color: var(--navy);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .category-chip.active {
      color: #fff;
      background: linear-gradient(135deg, #0d2742, #18466f);
      border-color: rgba(200, 165, 106, 0.92);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }

    #status {
      text-align: center;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.72);
      margin: 12px 0 18px;
    }

    #menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-section {
      position: relative;
      overflow: hidden;
      border-radius: 0;
      border: 1px solid rgba(200, 165, 106, 0.48);
      background:
        linear-gradient(180deg, rgba(5, 22, 42, 0.94), rgba(7, 27, 51, 0.94));
      scroll-margin-top: calc(var(--sticky-offset) + 10px);
      isolation: isolate;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.02),
        0 10px 30px rgba(0, 0, 0, 0.10);
    }

    .menu-section.hidden-by-search {
      display: none;
    }

    .menu-section::before,
    .menu-section::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      height: 1px;
      background: linear-gradient(90deg,
          transparent,
          rgba(200, 165, 106, 0.42),
          transparent);
      pointer-events: none;
      z-index: 0;
    }

    .menu-section::before {
      top: 18px;
    }

    .menu-section::after {
      bottom: 18px;
    }

    .section-toggle {
      position: relative;
      z-index: 1;
      width: 100%;
      border: none;
      background: transparent;
      text-align: center;
      color: #fff;
      padding: 26px 18px 16px;
      display: block;
      cursor: pointer;
      min-height: 88px;
    }

    .section-left,
    .section-title-wrap {
      display: block;
    }

    .section-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 26px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #f7f1e8;
      text-align: center;
      word-break: break-word;
      text-wrap: balance;
      padding-top: 8px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.14);
    }

    .section-arrow {
      width: 20px;
      height: 20px;
      margin: 8px auto 0;
      display: grid;
      place-items: center;
      color: rgba(200, 165, 106, 0.72);
      font-size: 13px;
      transition: transform .22s ease, opacity .22s ease;
    }

    .menu-section.open .section-arrow {
      transform: rotate(180deg);
    }

    .section-content {
      position: relative;
      z-index: 1;
      display: none;
      padding: 0 32px 38px;
    }

    .menu-section.open .section-content {
      display: block;
    }

    .section-content::before {
      content: "";
      display: block;
      width: 50%;
      max-width: 280px;
      height: 1px;
      margin: 0 auto 22px;
      background: linear-gradient(90deg,
          transparent,
          rgba(200, 165, 106, 0.48),
          transparent);
    }

    .items-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }

    .menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;

      padding: 22px 0;
      position: relative;
    }

    /* ürünler arası ince gold çizgi */
    .menu-item::after {
      content: "";
      display: block;
      width: 60%;
      height: 1px;
      margin-top: 18px;

      background: linear-gradient(90deg,
          transparent,
          rgba(200, 165, 106, 0.5),
          transparent);
    }

    /* son üründe çizgi olmasın */
    .menu-item:last-child::after {
      display: none;
    }

    .item-name {
      font-family: "Cormorant Garamond", serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #f7f1e8;
    }

    /* açıklama */
    .item-description {
      margin: 8px auto 0;
      width: 100%;
      max-width: none;

      font-size: 13px;
      line-height: 1.65;
      color: rgba(247, 241, 232, 0.68);

      font-style: italic;
      font-weight: 400;
      text-align: center;
    }

    .item-name-wrap {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }

    /* fiyat artık daha premium */
    .item-price {
      margin-top: 10px;

      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;

      color: #c8a56a;
      /* GOLD */
    }

    .menu-item.hidden-by-search {
      display: none;
    }

    .menu-item+.menu-item {
      margin-top: 2px;
    }







    .ag-note {
      margin-top: 18px;
      text-align: center;
      font-size: 11px;
      line-height: 1.6;
      color: rgba(247, 241, 232, 0.62);
      font-style: italic;
    }

    .contact-section {
      margin-top: 24px;
      border: 1px solid rgba(200, 165, 106, 0.36);
      background:
        linear-gradient(180deg, rgba(11, 27, 48, 0.98), rgba(8, 20, 36, 0.98)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
      padding: 26px 20px 24px;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 16px 34px rgba(0, 0, 0, 0.14);
    }

    .contact-section::before,
    .contact-section::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 165, 106, 0.55), transparent);
    }

    .contact-section::before {
      top: 18px;
    }

    .contact-section::after {
      bottom: 18px;
    }

    .contact-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .contact-logo {
      width: 66px;
      height: auto;
      display: block;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.18));
    }

    .contact-title {
      margin: 0;
      padding-top: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 30px;
      text-align: center;
      color: #fbf6ee;
      letter-spacing: 0.03em;
    }

    .contact-grid {
      display: grid;
      gap: 16px;
      padding: 0 6px;
    }

    .contact-item {
      display: grid;
      gap: 6px;
      justify-items: center;
      text-align: center;
    }

    .contact-label {
      font-family: "Cormorant Garamond", serif;
      font-size: 17px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--gold-soft);
    }

    .contact-value,
    .contact-value a {
      color: rgba(255, 248, 238, 0.94);
      text-decoration: none;
      font-size: 15px;
      line-height: 1.65;
    }

    .contact-value a:hover {
      color: #fff;
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      color: var(--gold-soft);
      font-size: 28px;
      line-height: 1.2;
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding-bottom: 0;
    }

    .site-footer {
      margin-top: 18px;
      padding: 12px 0 6px;
    }

    .site-footer-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 165, 106, 0.65), transparent);
      margin-bottom: 12px;
    }

    .site-footer-signature {
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.01em;
      color: rgba(247, 241, 232, 0.74);
      text-transform: none;
    }

    .scroll-top-btn {
      position: fixed;
      right: 16px;
      bottom: 18px;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(200, 165, 106, 0.34);
      border-radius: 0;
      background: rgba(8, 18, 32, 0.52);
      color: #fff;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.22);
      display: grid;
      place-items: center;
      cursor: pointer;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 120;
      font-size: 18px;
    }

    .scroll-top-btn.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    @media (max-width: 520px) {
      :root {
        --sticky-offset: 126px;
      }

      .item-name-wrap {
        max-width: 300px;
      }

      .shell {
        padding: 12px 10px 30px;
      }

      .hero {
        min-height: 332px;
        border-radius: 0;
      }

      .hero-inner {
        min-height: 332px;
        padding: 14px 14px 20px;
      }

      .hero-topbar {
        margin-bottom: 2px;
      }

      .lang-switch {
        gap: 6px;
        padding: 5px;
      }

      .lang-btn {
        min-width: 46px;
        padding: 7px 8px;
        font-size: 11px;
      }

      .hero-center {
        padding: 2px 14px 18px;
      }

      .hero-brand {
        gap: 8px;
        padding-top: 82px;
        margin-top: -10px;
      }

      .hero-logo-crop {
        top: -2px;
        width: 196px;
        height: 102px;
      }

      .hero-logo-crop::before {
        width: 156px;
        height: 102px;
        filter: blur(14px);
      }

      .hero-logo {
        width: 196px;
        height: auto;
      }

      .hero-title-wrap::before {
        width: 94%;
        height: 106px;
      }

      h1 {
        font-size: 46px;
        letter-spacing: 0.04em;
      }

      .hero-subtitle {
        font-size: 12px;
        letter-spacing: 0.02em;
      }

      .search-input {
        height: 46px;
        font-size: 13px;
      }

      .chips-wrap {
        margin-bottom: 10px;
      }

      .category-chip {
        padding: 8px 13px;
        font-size: 11px;
      }

      .menu-section::before,
      .menu-section::after,
      .contact-section::before,
      .contact-section::after {
        left: 14px;
        right: 14px;
      }

      .section-toggle {
        padding: 22px 14px 14px;
        min-height: 78px;
      }

      .section-title {
        font-size: 22px;
        letter-spacing: 0.05em;
        padding-top: 6px;
      }

      .section-arrow {
        margin-top: 10px;
        font-size: 14px;
      }

      .section-content {
        padding: 0 24px 32px;
      }

      .section-content::before {
        margin-bottom: 16px;
      }

      .item-name {
        font-size: 22px;
      }

      .item-description {
        font-size: 12px;
      }

      .item-price {
        font-size: 15px;
      }

      .contact-logo {
        width: 58px;
      }

      .contact-title {
        font-size: 26px;
      }

      .contact-label {
        font-size: 16px;
      }

      .contact-value,
      .contact-value a {
        font-size: 13px;
      }

      .footer-note {
        font-size: 25px;
      }

      .ag-note {
        font-size: 10px;
        margin-top: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="container">
      <header class="hero">
        <img class="hero-bg-img" src="./hero-bg.jpg" alt="İnci Balık masa görseli">

        <div class="hero-inner">
          <div class="hero-topbar">
            <div class="lang-switch">
              <button id="tr-btn" class="lang-btn active" type="button">TR</button>
              <button id="en-btn" class="lang-btn" type="button">EN</button>
            </div>
          </div>

          <div class="hero-center">
            <div class="hero-brand">
              <div class="hero-logo-crop">
                <img src="./incibaliklogo-cropped.png" class="hero-logo" alt="İnci Balık Logo">
              </div>

              <div class="hero-title-wrap">
                <h1 id="site-title">İnci Balık</h1>
              </div>

              <div class="hero-subtitle" id="hero-subtitle">Denizden gelen tatlar</div>
            </div>
          </div>
        </div>
      </header>

      <div class="search-wrap">
        <div class="search-bar">
          <span class="search-icon">⌕</span>
          <input id="menu-search" class="search-input" type="search" placeholder="Menüde ara..."
            aria-label="Menüde ara">
        </div>
      </div>

      <div class="chips-wrap">
        <div class="chips-bar" id="category-chips"></div>
      </div>

      <div id="status">Yükleniyor...</div>
      <div id="menu"></div>

      <div class="contact-section" id="contact">
        <div class="contact-brand">
          <img src="./incibaliklogo-cropped.png" class="contact-logo" alt="İnci Balık Logo">
          <h2 class="contact-title">İnci Balık</h2>
        </div>

        <div class="contact-grid">
          <div class="contact-item">
            <div class="contact-label">Konum</div>
            <div class="contact-value">
              <a href="https://www.google.com/maps/place/%C4%B0NC%C4%B0+BALIK/@40.9349114,29.1223408,17z/data=!3m1!4b1!4m6!3m5!1s0x14cac76212ef5885:0xf8cda860530bcb6e!8m2!3d40.9349114!4d29.1249157!16s%2Fg%2F11gbkw5w4b?entry=ttu&g_ep=EgoyMDI2MDMyNC4wIKXMDSoASAFQAw%3D%3D"
                target="_blank" rel="noopener">📍 İnci Balık, Maltepe / İstanbul</a>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-label">İletişim</div>
            <div class="contact-value">
              <a href="https://wa.me/905523990253" target="_blank" rel="noopener">📞 0552 399 02 53</a>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-label">Instagram</div>
            <div class="contact-value">
              <a href="https://www.instagram.com/incibalikmaltepe/" target="_blank" rel="noopener">📷
                @incibalikmaltepe</a>
            </div>
          </div>
        </div>
      </div>

      <div class="footer-note" id="footer-note">Afiyetle.</div>

      <footer class="site-footer">
        <div class="site-footer-line"></div>
        <div class="site-footer-signature">Designed by Zeynep Mutlu</div>
      </footer>
    </div>
  </div>

  <button class="scroll-top-btn" id="scroll-top-btn" type="button" aria-label="Yukarı çık">↑</button>

  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJd-Y9GNyfAtMHUGYPIgUvEK1xrYHm05tx_RT-rsA6586Fmb6aoScfbDsje_34ojF81ZDDD5nNWLJk/pub?gid=0&single=true&output=csv";

    let currentLang = "tr";
    let allItems = [];
    let currentOpenCategoryId = null;

    const uiText = {
      tr: {
        subtitle: "Denizden gelen tatlar",
        footer: "Afiyetle.",
        errorPrefix: "Hata:",
        searchPlaceholder: "Menüde ara..."
      },
      en: {
        subtitle: "Flavours from the Sea",
        footer: "Bon appétit.",
        errorPrefix: "Error:",
        searchPlaceholder: "Search the menu..."
      }
    };

    const categoryConfig = [
      { id: "mezeler", trKey: "Mezeler", enKey: "Mezes", trLabel: "Mezeler", enLabel: "Mezes" },
      { id: "ara-sicaklar", trKey: "Ara Sıcaklar", enKey: "Hot Starters", trLabel: "Ara Sıcaklar", enLabel: "Hot Starters" },
      { id: "ana-yemekler", trKey: "Ana Yemekler", enKey: "Main Courses", trLabel: "Ana Yemekler", enLabel: "Main Courses" },
      { id: "salatalar", trKey: "Salatalar", enKey: "Salads", trLabel: "Salatalar", enLabel: "Salads" },
      { id: "tatlilar", trKey: "Tatlılar", enKey: "Desserts", trLabel: "Tatlılar", enLabel: "Desserts" },
      { id: "icecekler", trKey: "İçecekler", enKey: "Drinks", trLabel: "İçecekler", enLabel: "Drinks" },
      { id: "ickiler", trKey: "Alkollü İçecekler", enKey: "Alcoholic Drinks", trLabel: "İçkiler", enLabel: "Alcohol" }
    ];

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result.map(item => item.replace(/^"|"$/g, ""));
    }

    function getCategoryMetaBySheetKey(sheetKey) {
      if (currentLang === "tr") return categoryConfig.find(cat => cat.trKey === sheetKey);
      return categoryConfig.find(cat => cat.enKey === sheetKey);
    }

    function getCurrentCategories() {
      return categoryConfig.map(cat => ({
        id: cat.id,
        key: currentLang === "tr" ? cat.trKey : cat.enKey,
        label: currentLang === "tr" ? cat.trLabel : cat.enLabel
      }));
    }

    function updateStaticTexts() {
      const t = uiText[currentLang];
      document.getElementById("hero-subtitle").innerText = t.subtitle;
      document.getElementById("footer-note").innerText = t.footer;
      document.getElementById("menu-search").placeholder = t.searchPlaceholder;
    }

    function updateActiveChip() {
      document.querySelectorAll(".category-chip").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.categoryId === currentOpenCategoryId);
      });
    }

    function closeAllSections() {
      document.querySelectorAll(".menu-section").forEach(section => section.classList.remove("open"));
    }

    function getScrollTarget(section) {
      const searchWrap = document.querySelector(".search-wrap");
      const chipsWrap = document.querySelector(".chips-wrap");
      const searchHeight = searchWrap ? searchWrap.offsetHeight : 0;
      const chipsHeight = chipsWrap ? chipsWrap.offsetHeight : 0;
      const extraGap = window.innerWidth <= 520 ? 8 : 12;
      return Math.max(0, window.scrollY + section.getBoundingClientRect().top - searchHeight - chipsHeight - extraGap);
    }

    function scrollToSection(section) {
      const targetTop = getScrollTarget(section);
      window.scrollTo({ top: targetTop, behavior: "smooth" });
    }

    function openSectionById(categoryId, shouldScroll = false) {
      const section = document.querySelector(`.menu-section[data-category-id="${categoryId}"]`);
      if (!section) return;

      closeAllSections();
      section.classList.add("open");
      currentOpenCategoryId = categoryId;
      updateActiveChip();

      if (shouldScroll) {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => scrollToSection(section));
        });
      }
    }

    function goToCategory(categoryId) {
      openSectionById(categoryId, true);
    }

    function toggleCategory(categoryId) {
      const section = document.querySelector(`.menu-section[data-category-id="${categoryId}"]`);
      if (!section) return;

      const isOpen = section.classList.contains("open");
      if (isOpen) {
        section.classList.remove("open");
        currentOpenCategoryId = null;
        updateActiveChip();
      } else {
        openSectionById(categoryId, true);
      }
    }

    function buildCategoryChips(visibleCategoryIds) {
      const chipsContainer = document.getElementById("category-chips");
      chipsContainer.innerHTML = "";

      getCurrentCategories()
        .filter(cat => visibleCategoryIds.includes(cat.id))
        .forEach(category => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "category-chip";
          btn.innerText = category.label;
          btn.dataset.categoryId = category.id;
          btn.addEventListener("click", () => goToCategory(category.id));
          chipsContainer.appendChild(btn);
        });

      updateActiveChip();
    }

    function foldText(value) {
      return (value || "")
        .toString()
        .toLocaleLowerCase("tr-TR")
        .replace(/ı/g, "i")
        .replace(/İ/g, "i")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function applySearchFilter() {
      const input = document.getElementById("menu-search");
      if (!input) return;
      const query = foldText(input.value.trim());

      const sections = document.querySelectorAll(".menu-section");
      sections.forEach(section => {
        const items = section.querySelectorAll(".menu-item");
        let visibleItemCount = 0;

        items.forEach(item => {
          const text = foldText(item.innerText);
          const match = !query || text.includes(query);
          item.classList.toggle("hidden-by-search", !match);
          if (match) visibleItemCount += 1;
        });

        section.classList.toggle("hidden-by-search", visibleItemCount === 0);

        if (query && visibleItemCount > 0) {
          section.classList.add("open");
        } else if (!query && currentOpenCategoryId) {
          section.classList.toggle("open", section.dataset.categoryId === currentOpenCategoryId);
        }
      });
    }

    function renderMenu() {
      const menuDiv = document.getElementById("menu");
      menuDiv.innerHTML = "";
      const grouped = {};
      const visibleCategoryIds = [];

      allItems.forEach(item => {
        const sheetCategory = currentLang === "tr" ? item.category_tr : item.category_en;
        const meta = getCategoryMetaBySheetKey(sheetCategory);
        if (!meta) return;

        if (!grouped[meta.id]) {
          grouped[meta.id] = [];
          visibleCategoryIds.push(meta.id);
        }

        grouped[meta.id].push({
          product: currentLang === "tr" ? item.product_tr : item.product_en,
          description: currentLang === "tr" ? item.description_tr : item.description_en,
          price: item.price,
          sort_order: item.sort_order
        });
      });

      getCurrentCategories().filter(category => grouped[category.id]).forEach(category => {
        grouped[category.id].sort((a, b) => a.sort_order - b.sort_order);

        const section = document.createElement("section");
        section.className = `menu-section theme-${category.id}`;
        section.dataset.categoryId = category.id;

        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "section-toggle";
        toggle.addEventListener("click", () => toggleCategory(category.id));

        const left = document.createElement("div");
        left.className = "section-left";

        const titleWrap = document.createElement("div");
        titleWrap.className = "section-title-wrap";

        const title = document.createElement("div");
        title.className = "section-title";
        title.innerText = category.label;

        titleWrap.appendChild(title);
        left.appendChild(titleWrap);

        const arrow = document.createElement("div");
        arrow.className = "section-arrow";
        arrow.innerText = "⌄";

        toggle.appendChild(left);
        toggle.appendChild(arrow);

        const content = document.createElement("div");
        content.className = "section-content";

        const grid = document.createElement("div");
        grid.className = "items-grid";

        grouped[category.id].forEach(item => {
          const row = document.createElement("div");
          row.className = "menu-item";

          const nameWrap = document.createElement("div");
          nameWrap.className = "item-name-wrap";

          const name = document.createElement("div");
          name.className = "item-name";
          name.innerText = item.product || "";
          nameWrap.appendChild(name);

          if (item.description) {
            const desc = document.createElement("div");
            desc.className = "item-description";
            desc.innerText = item.description;
            nameWrap.appendChild(desc);
          }

          const price = document.createElement("div");
          price.className = "item-price";
          price.innerText = item.price === "AG" ? "AG" : `${item.price} TL`;

          row.appendChild(nameWrap);
          row.appendChild(price);
          grid.appendChild(row);
        });

        content.appendChild(grid);

        if (category.id === "ana-yemekler") {
          const agNote = document.createElement("div");
          agNote.className = "ag-note";
          agNote.innerText = currentLang === "tr"
            ? "* AG: Günlük alış fiyatına göre değişmektedir."
            : "* AG: Price varies according to daily purchase cost.";
          content.appendChild(agNote);
        }

        section.appendChild(toggle);
        section.appendChild(content);
        menuDiv.appendChild(section);
      });

      buildCategoryChips(visibleCategoryIds);
      if (!currentOpenCategoryId || !visibleCategoryIds.includes(currentOpenCategoryId)) {
        currentOpenCategoryId = visibleCategoryIds[0] || null;
      }
      if (currentOpenCategoryId) openSectionById(currentOpenCategoryId, false);
      applySearchFilter();
    }

    fetch(sheetURL)
      .then(response => {
        if (!response.ok) throw new Error("Veri alınamadı. Status: " + response.status);
        return response.text();
      })
      .then(data => {
        const rows = data.trim().split("\n").slice(1);
        allItems = [];
        rows.forEach(row => {
          const cols = parseCSVLine(row);
          const item = {
            id: cols[0] || "",
            category_tr: cols[1] || "",
            category_en: cols[2] || "",
            product_tr: cols[3] || "",
            product_en: cols[4] || "",
            description_tr: cols[5] || "",
            description_en: cols[6] || "",
            price: cols[7] || "",
            status: cols[8] || "",
            sort_order: Number(cols[9]) || 0
          };
          if (item.status === "active") allItems.push(item);
        });
        document.getElementById("status").innerText = "";
        updateStaticTexts();
        renderMenu();
      })
      .catch(error => {
        document.getElementById("status").innerText = `${uiText[currentLang].errorPrefix} ${error.message}`;
      });

    document.getElementById("tr-btn").addEventListener("click", () => {
      currentLang = "tr";
      document.getElementById("tr-btn").classList.add("active");
      document.getElementById("en-btn").classList.remove("active");
      currentOpenCategoryId = null;
      updateStaticTexts();
      renderMenu();
    });

    document.getElementById("en-btn").addEventListener("click", () => {
      currentLang = "en";
      document.getElementById("en-btn").classList.add("active");
      document.getElementById("tr-btn").classList.remove("active");
      currentOpenCategoryId = null;
      updateStaticTexts();
      renderMenu();
    });

    document.getElementById("menu-search").addEventListener("input", applySearchFilter);

    const scrollTopBtn = document.getElementById("scroll-top-btn");
    window.addEventListener("scroll", () => {
      scrollTopBtn.classList.toggle("visible", window.scrollY > 320);
    });

    scrollTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
</body>

</html>
